#---------
# BINDING
#---------

# Map 'C-Space' as second prefix
set-option -g prefix2 C-Space

# Split panes using | and -
bind | split-window -h
bind - split-window -v

# Reload tmux config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded Tmux!"

#------
# MISC
#------

# Start counting pane and window number at 1
set -g base-index 1
set -g pane-base-index 1

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Don't rename windows automatically
set-option -g allow-rename off

# use vi keys in copy mode
set-option -g mode-keys vi

# Vim autoread fix
set-option -g focus-events on

# True colors
%if "#{==:#{COLORTERM},truecolor}"
set-option -a terminal-features ",*:RGB"
%endif

#--------
# DESIGN
#--------

#--------
# COLORS
#--------

main='#875fff'
black="#666666"
panes_border="#666666"
fg_highlight="#87d75f"

#------------
# Status Bar
#------------

# Status options
set-option -g status-interval 1
set-option -g status on
set-option -g status-justify absolute-centre

# Basic status bar colors
set-option -g status-style "fg=default,bg=default"

# Left side
set-option -g status-left        "[#S] #{?client_prefix,⁽⌃⁾,}"
set-option -g status-left-style  "fg=$main,bg=default"
set-option -g status-left-length 128

time_format='%H:%M'
date_format='%d-%m-%Y'

# Right side
set-option -g status-right        "[$time_format $date_format]"
set-option -g status-right-style  "fg=$main,bg=default"
set-option -g status-right-length 128

# Window status format
set-option -g window-status-format         "(#I-#W#F)"
set-option -g window-status-current-format "(#I-#W#F)"
set-option -g window-status-separator      " "

# Window status style
set-option -g window-status-style          "fg=$black,bg=default,none"
set-option -g window-status-last-style     "fg=$black,bg=default,none"
set-option -g window-status-current-style  "fg=$main,bg=default,none"
set-option -g window-status-activity-style "fg=$main,bg=default,none"

#-------
# Panes
#-------

# Pane border
set-option -g pane-border-style "fg=$panes_border,bg=default"

# Active pane border
set-option -g pane-active-border-style "fg=$main,bg=default"

# Pane number indicator
set-option -g display-panes-colour "$panes_border"
set-option -g display-panes-active-colour "$main"

# Clock mode
set-option -g clock-mode-colour "$main"
set-option -g clock-mode-style 24

# Message
set-option -g message-style "fg=$main"

# Command message
set-option -g message-command-style "fg=$main"

# Copy mode highlight
set-option -g mode-style "bg=$main,fg=$fg_highlight"
